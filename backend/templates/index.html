<!DOCTYPE html>
<html>
<head>
  <title>Question Sorter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📘 Question Sorter</h1>
    <p class="subtitle">Upload syllabus & question bank to generate sorted output</p>

    <div class="card">
      <label>Syllabus File</label>
      <input type="file" id="syllabus">

      <label>Question Bank</label>
      <input type="file" id="questions">

      <button id="generateBtn">Generate Mapping</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="/static/script.js"></script>
<link rel="stylesheet" href="/static/style.css">

</body>
</html>
